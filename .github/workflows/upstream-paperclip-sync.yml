name: sync-upstream-paperclip

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch latest upstream release and npm version
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from datetime import datetime, timezone

          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "github-actions"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.load(r)

          gh = get_json('https://api.github.com/repos/paperclipai/paperclip/releases/latest')
          npm = get_json('https://registry.npmjs.org/paperclipai/latest')

          payload = {
              'tracked_at_utc': datetime.now(timezone.utc).isoformat(),
              'upstream_repo': 'paperclipai/paperclip',
              'latest_github_release_tag': gh.get('tag_name'),
              'latest_github_release_name': gh.get('name'),
              'latest_github_release_published_at': gh.get('published_at'),
              'latest_npm_version': npm.get('version'),
          }

          with open('.upstream-paperclip.json', 'w') as f:
              json.dump(payload, f, indent=2)
              f.write('\n')
          PY

      - name: Commit tracker update if changed
        run: |
          if git diff --quiet -- .upstream-paperclip.json; then
            echo "No upstream version change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .upstream-paperclip.json
          git commit -m "chore: sync upstream paperclip release tracker"
          git push
