name: sync-upstream-dependencies

on:
  workflow_dispatch:
  schedule:
    - cron: '17 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch upstream dependency versions
        run: |
          python3 - <<'PY'
          import json, urllib.request
          from datetime import datetime, timezone

          def get_json(url):
              req = urllib.request.Request(url, headers={"User-Agent": "github-actions"})
              with urllib.request.urlopen(req, timeout=30) as r:
                  return json.load(r)

          def latest_release(repo):
              data = get_json(f'https://api.github.com/repos/{repo}/releases/latest')
              return {
                  'repo': repo,
                  'tag': data.get('tag_name'),
                  'name': data.get('name'),
                  'published_at': data.get('published_at'),
              }

          def branch_head(repo, branch):
              data = get_json(f'https://api.github.com/repos/{repo}/commits/{branch}')
              return {
                  'repo': repo,
                  'branch': branch,
                  'sha': data.get('sha'),
                  'committed_at': (((data.get('commit') or {}).get('committer') or {}).get('date')),
              }

          def npm_latest(pkg):
              encoded = pkg.replace('/', '%2f')
              data = get_json(f'https://registry.npmjs.org/{encoded}/latest')
              return {
                  'package': pkg,
                  'version': data.get('version'),
              }

          payload = {
              'tracked_at_utc': datetime.now(timezone.utc).isoformat(),
              'dockerfile_sources': {
                  'paperclipai_release': latest_release('paperclipai/paperclip'),
                  'paperclipai_npm': npm_latest('paperclipai'),
                  'opencode_ai_npm': npm_latest('opencode-ai'),
              },
              'package_json_sources': {
                  'paperclipai_npm': npm_latest('paperclipai'),
                  'claude_code_npm': npm_latest('@anthropic-ai/claude-code'),
                  'codex_npm': npm_latest('@openai/codex'),
              }
          }

          with open('.upstream-paperclip.json', 'w') as f:
              json.dump(payload, f, indent=2)
              f.write('\n')
          PY

      - name: Commit tracker update if changed
        run: |
          if git diff --quiet -- .upstream-paperclip.json; then
            echo "No upstream dependency change"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .upstream-paperclip.json
          git commit -m "chore: sync upstream dependency tracker"
          git push
